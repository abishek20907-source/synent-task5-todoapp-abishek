<!DOCTYPE html>

<html>

<head>

<title>Smart To-Do App</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>My To-Do List</h1>

<button class="dark-btn" onclick="toggleDarkMode()">
🌙 Toggle Dark Mode
</button>

<div class="input-area">


<input 
type="text" 
id="taskInput"
placeholder="Enter your task">


<button onclick="addTask()">
Add
</button>


</div>

<p id="taskCount">
Tasks: 0
</p>

<div class="filters">

<button onclick="showAll()">
All
</button>


<button onclick="showPending()">
Pending
</button>


<button onclick="showCompleted()">
Completed
</button>

</div>

<ul id="taskList">

</ul>


</div>


<script src="script.js"></script>


</body>


</html>
